<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚细旅行 - 财务报销 AI 智能审计系统 v2.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
        .animate-shake { animation: shake 0.2s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const ZHIPU_API_KEY = "8776cadbc359430cab2d635625ac65fe.3U3GnOC5VU2FfNKo";
        
        const TARGET_COMPANIES = [
            "上海飞蚁旅行社有限公司",
            "上海聚细文化传播有限公司",
            "上海三志城会务服务有限公司",
            "上海溪聚商务咨询有限公司"
        ];

        const App = () => {
            const [reimbursementData, setReimbursementData] = useState([]);
            const [invoiceFiles, setInvoiceFiles] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [results, setResults] = useState([]);
            const [logs, setLogs] = useState([]);
            const [header, setHeader] = useState({ name: '', company: '' });
            const [activeTab, setActiveTab] = useState('all');

            const addLog = (msg) => setLogs(prev => [`[${new Date().toLocaleTimeString()}] ${msg}`, ...prev]);

            const convertPdfToImage = async (file) => {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                return canvas.toDataURL('image/jpeg', 0.9);
            };

            const handleExcel = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                    const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                    
                    let dataStart = -1, amtCol = -1, summaryCol = -1, projectCol = -1;
                    rows.forEach((row, i) => {
                        if (row.includes('序号') && row.includes('报销金额')) { 
                            dataStart = i; 
                            amtCol = row.indexOf('报销金额');
                            summaryCol = row.indexOf('摘要');
                            projectCol = row.indexOf('报销项目');
                        }
                        const s = row.join(',');
                        if (s.includes('报销人：')) setHeader(h => ({...h, name: row[row.indexOf('报销人：') + 2]}));
                        if (s.includes('付款公司：')) setHeader(h => ({...h, company: row[row.indexOf('付款公司：') + 1]}));
                    });

                    if (dataStart === -1) return alert("未找到报销明细行，请确保使用标准模板。");

                    const formatted = [];
                    let lastProj = "";
                    for (let i = dataStart + 1; i < rows.length; i++) {
                        const row = rows[i];
                        const rowStr = row.join('').replace(/\s+/g, ''); 
                        if (rowStr.includes('合计') || rowStr.includes('合    计')) break;
                        const amt = parseFloat(row[amtCol]);
                        const summary = row[summaryCol];
                        if (isNaN(amt) || !summary) continue;
                        if (row[projectCol]) lastProj = row[projectCol];
                        formatted.push({ project: lastProj || '其他', desc: summary, amount: amt, status: 'pending' });
                    }
                    setReimbursementData(formatted);
                    addLog(`Excel 载入：识别到 ${formatted.length} 条报销项。`);
                };
                reader.readAsBinaryString(file);
            };

            const handleFiles = (e) => {
                const files = Array.from(e.target.files).map(f => ({
                    id: Math.random().toString(36).substr(2, 9),
                    file: f,
                    name: f.name,
                    isPdf: f.type === 'application/pdf',
                    preview: f.type.startsWith('image/') ? URL.createObjectURL(f) : null,
                    status: 'waiting',
                    aiData: null,
                    isMatched: false // 新增：标记是否被报销单匹配
                }));
                setInvoiceFiles(prev => [...prev, ...files]);
                addLog(`载入票据：${files.length} 个文件`);
            };

            const callAi = async (imageBase64) => {
                try {
                    const response = await fetch("https://open.bigmodel.cn/api/paas/v4/chat/completions", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ZHIPU_API_KEY}` },
                        body: JSON.stringify({
                            model: "glm-4v",
                            messages: [{
                                role: "user",
                                content: [
                                    { type: "text", text: `识别此发票内容。输出 JSON（严禁 Markdown）：
                                        {
                                            "amount": 数字,
                                            "buyerName": "购买方全称",
                                            "invoiceNumber": "发票号码"
                                        }` 
                                    },
                                    { type: "image_url", image_url: { url: imageBase64.split(',')[1] } }
                                ]
                            }]
                        })
                    });
                    const res = await response.json();
                    const content = res.choices[0].message.content;
                    const match = content.match(/\{.*\}/s);
                    return match ? JSON.parse(match[0]) : null;
                } catch (e) { return null; }
            };

            const startAudit = async () => {
                if (!reimbursementData.length || !invoiceFiles.length) return alert("请先上传 Excel 和 票据");
                setIsProcessing(true);
                addLog("启动 AI 智能审计与发票双向核对...");

                const currentFiles = [...invoiceFiles];
                const seenInvoiceNumbers = new Set();

                // 重置所有文件的匹配状态
                currentFiles.forEach(f => f.isMatched = false);

                // 1. AI 识别所有发票
                for (let i = 0; i < currentFiles.length; i++) {
                    const item = currentFiles[i];
                    item.status = 'processing';
                    setInvoiceFiles([...currentFiles]);

                    let base64 = "";
                    if (item.isPdf) {
                        base64 = await convertPdfToImage(item.file);
                    } else {
                        base64 = await new Promise(r => {
                            const rd = new FileReader();
                            rd.onload = e => r(e.target.result);
                            rd.readAsDataURL(item.file);
                        });
                    }

                    const aiResult = await callAi(base64);
                    if (aiResult) {
                        aiResult.isHeaderOk = TARGET_COMPANIES.includes(aiResult.buyerName);
                        aiResult.isDuplicate = seenInvoiceNumbers.has(aiResult.invoiceNumber);
                        if (aiResult.invoiceNumber) seenInvoiceNumbers.add(aiResult.invoiceNumber);
                        item.aiData = aiResult;
                        addLog(`识别: ${item.name} -> ¥${aiResult.amount}`);
                    }
                    item.status = 'done';
                    setInvoiceFiles([...currentFiles]);
                }

                // 2. 双向比对：报销单找发票，发票找报销单
                const finalResults = reimbursementData.map(row => {
                    // 在已识别的发票中找匹配的（且还没被匹配过的）
                    const match = currentFiles.find(f => 
                        !f.isMatched && 
                        f.aiData && 
                        Math.abs(f.aiData.amount - row.amount) < 0.5
                    );

                    let status = 'missing', note = "未找到匹配票据";

                    if (match) {
                        match.isMatched = true; // 标记该发票已使用
                        if (!match.aiData.isHeaderOk) {
                            status = 'error_header';
                            note = `抬头异常: ${match.aiData.buyerName || '未知'}`;
                        } else if (match.aiData.isDuplicate) {
                            status = 'error_duplicate';
                            note = `单号重复: ${match.aiData.invoiceNumber}`;
                        } else {
                            status = 'ok';
                            note = `核对一致 (单号: ${match.aiData.invoiceNumber})`;
                        }
                    }
                    return { ...row, status, note };
                });

                // 检查哪些发票没有被用上
                const unmatchedInvoices = currentFiles.filter(f => f.aiData && !f.isMatched);
                if (unmatchedInvoices.length > 0) {
                    addLog(`警告：发现 ${unmatchedInvoices.length} 张发票未在报销单中找到对应金额项目！`);
                }

                setResults(finalResults);
                setInvoiceFiles([...currentFiles]);
                setIsProcessing(false);
                addLog("审计完成。已标记多余票据。");
            };

            const exportToExcel = () => {
                if (!results.length) return;
                addLog("正在导出详细审计报告...");
                
                // 第一页：报销单比对结果
                const exportData = results.map((item, index) => ({
                    "序号": index + 1,
                    "报销项目": item.project,
                    "摘要": item.desc,
                    "金额": item.amount,
                    "合规状态": item.status === 'ok' ? '通过' : 
                                item.status === 'error_header' ? '抬头错误' : 
                                item.status === 'error_duplicate' ? '重复票据' : '缺票据',
                    "系统说明": item.note
                }));

                // 第二页：多余发票列表
                const extraInvoices = invoiceFiles.filter(f => f.aiData && !f.isMatched).map(f => ({
                    "文件名": f.name,
                    "识别金额": f.aiData.amount,
                    "发票抬头": f.aiData.buyerName,
                    "发票号码": f.aiData.invoiceNumber,
                    "原因": "该发票金额在报销单中无对应项"
                }));

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(exportData), "报销单对账");
                if (extraInvoices.length > 0) {
                    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(extraInvoices), "多余发票预警");
                }
                
                XLSX.writeFile(wb, `审计报告_${header.name || '未命名'}_${new Date().toISOString().slice(0,10)}.xlsx`);
                addLog("审计报告已下载。");
            };

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <div className="p-3 bg-indigo-600 rounded-2xl text-white shadow-lg">
                                    <i data-lucide="shield-check"></i>
                                </div>
                                <div>
                                    <h1 className="text-xl font-black text-slate-800 italic uppercase">Juxi Travel <span className="text-indigo-600">Audit v2.3</span></h1>
                                    <div className="flex flex-wrap gap-x-4 text-[10px] font-bold text-slate-400 mt-0.5 tracking-widest uppercase">
                                        <span>User: {header.name || 'N/A'}</span>
                                        <span className="text-indigo-500">Dual-Match Engine Active</span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex gap-3">
                                <button onClick={() => window.location.reload()} className="px-5 py-2 text-xs font-bold text-slate-400 hover:bg-slate-50 rounded-xl transition-all">重置</button>
                                <button onClick={startAudit} disabled={isProcessing} className={`px-10 py-2.5 rounded-xl font-black text-xs text-white shadow-xl transition-all ${isProcessing ? 'bg-slate-300' : 'bg-indigo-600 hover:bg-indigo-700 active:scale-95 shadow-indigo-100'}`}>
                                    {isProcessing ? "审计中..." : "开始审计"}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 mt-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* 左侧控制栏 */}
                        <div className="lg:col-span-4 space-y-6">
                            <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                <h3 className="font-bold text-xs text-slate-700 flex items-center gap-2 mb-4 uppercase tracking-wider"><i data-lucide="file-spreadsheet" className="text-green-500 w-4 h-4"></i> 1. 上传报销单 Excel</h3>
                                <input type="file" accept=".xlsx" onChange={handleExcel} className="block w-full text-[10px] text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer" />
                            </div>

                            <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-xs text-slate-700 flex items-center gap-2 uppercase tracking-wider"><i data-lucide="file-image" className="text-indigo-500 w-4 h-4"></i> 2. 票据库</h3>
                                    {invoiceFiles.length > 0 && <span className="text-[10px] font-bold text-slate-400">共 {invoiceFiles.length} 张</span>}
                                </div>
                                <input type="file" multiple accept="image/*,application/pdf" onChange={handleFiles} className="block w-full text-[10px] text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer mb-4" />
                                
                                <div className="grid grid-cols-3 gap-3 max-h-60 overflow-y-auto custom-scrollbar pr-1">
                                    {invoiceFiles.map(f => {
                                        const isUnmatched = results.length > 0 && f.aiData && !f.isMatched;
                                        const isMatched = results.length > 0 && f.isMatched;
                                        return (
                                            <div key={f.id} className={`relative aspect-square rounded-xl bg-slate-50 border-2 transition-all group overflow-hidden ${
                                                isUnmatched ? 'border-rose-500 shadow-md shadow-rose-100' : 
                                                isMatched ? 'border-emerald-500' : 'border-slate-100'
                                            }`}>
                                                {f.isPdf ? <div className="w-full h-full flex items-center justify-center text-red-400 scale-75"><i data-lucide="file-text"></i></div> : <img src={f.preview} className="w-full h-full object-cover" />}
                                                
                                                {/* 状态遮罩 */}
                                                {f.status === 'processing' && <div className="absolute inset-0 bg-white/80 flex items-center justify-center"><i data-lucide="refresh-cw" className="animate-spin w-4 h-4 text-indigo-600"></i></div>}
                                                
                                                {/* 匹配指示器 */}
                                                {isMatched && (
                                                    <div className="absolute bottom-0 inset-x-0 bg-emerald-500 text-white text-[8px] font-bold text-center py-0.5">已匹配</div>
                                                )}
                                                {isUnmatched && (
                                                    <div className="absolute bottom-0 inset-x-0 bg-rose-500 text-white text-[8px] font-bold text-center py-0.5 animate-pulse">未被报销单引用</div>
                                                )}

                                                <button onClick={() => setInvoiceFiles(p => p.filter(x => x.id !== f.id))} className="absolute top-1 right-1 bg-red-500 text-white p-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" className="w-3 h-3"></i></button>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="bg-slate-900 rounded-3xl p-5 h-44 overflow-y-auto custom-scrollbar shadow-xl">
                                <div className="text-[9px] font-black text-indigo-400 mb-2 tracking-widest uppercase flex items-center gap-2">
                                    <span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Terminal Console
                                </div>
                                {logs.map((l, i) => <div key={i} className="text-[9px] text-slate-500 font-mono mb-1 leading-tight"><span className="text-slate-700">[{i}]</span> {l}</div>)}
                            </div>
                        </div>

                        {/* 右侧主看板 */}
                        <div className="lg:col-span-8 bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden flex flex-col h-[700px]">
                            <div className="px-8 py-5 border-b border-slate-50 flex justify-between items-center bg-white sticky top-0 z-10">
                                <div>
                                    <h2 className="font-black text-lg text-slate-800 tracking-tight">审计报告清单</h2>
                                    {results.length > 0 && <span className="text-[9px] text-indigo-500 font-bold uppercase tracking-widest">Double-Entry Verification Done</span>}
                                </div>
                                <div className="flex items-center gap-4">
                                    {results.length > 0 && (
                                        <button onClick={exportToExcel} className="flex items-center gap-1.5 px-4 py-1.5 bg-emerald-50 text-emerald-600 text-[10px] font-black rounded-lg border border-emerald-100 hover:bg-emerald-100 transition-colors shadow-sm"><i data-lucide="download" className="w-3.5 h-3.5"></i> 导出完整报告</button>
                                    )}
                                    <div className="flex bg-slate-100 p-1 rounded-xl border border-slate-200">
                                        {['all', 'ok', 'missing'].map(t => (
                                            <button key={t} onClick={() => setActiveTab(t)} className={`px-5 py-1.5 rounded-lg text-[10px] font-black tracking-widest transition-all ${activeTab === t ? 'bg-white text-indigo-600 shadow-sm border border-slate-200' : 'text-slate-400 hover:text-slate-600'}`}>
                                                {t === 'all' ? '全部' : t === 'ok' ? '成功' : '异常'}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto custom-scrollbar">
                                <table className="w-full text-left border-collapse">
                                    <thead className="bg-slate-50/50 sticky top-0 z-10 backdrop-blur-md">
                                        <tr>
                                            <th className="px-8 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">审计结果</th>
                                            <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">项目/摘要</th>
                                            <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">报销金额</th>
                                            <th className="px-8 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">详细说明</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {(results.length > 0 ? (activeTab === 'all' ? results : results.filter(r => r.status === activeTab || (activeTab === 'missing' && r.status.includes('error')))) : reimbursementData).map((item, i) => (
                                            <tr key={i} className="hover:bg-slate-50 transition-colors group">
                                                <td className="px-8 py-5">
                                                    {item.status === 'ok' ? (
                                                        <div className="flex items-center gap-1.5 text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full text-[10px] font-black border border-emerald-100 w-fit"><i data-lucide="check-circle" className="w-3.5 h-3.5"></i> 已配对</div>
                                                    ) : item.status === 'error_header' ? (
                                                        <div className="flex items-center gap-1.5 text-amber-600 bg-amber-50 px-3 py-1.5 rounded-full text-[10px] font-black border border-amber-100 w-fit animate-shake"><i data-lucide="shield-alert" className="w-3.5 h-3.5"></i> 抬头异常</div>
                                                    ) : item.status === 'error_duplicate' ? (
                                                        <div className="flex items-center gap-1.5 text-rose-600 bg-rose-50 px-3 py-1.5 rounded-full text-[10px] font-black border border-rose-100 w-fit animate-shake"><i data-lucide="copy" className="w-3.5 h-3.5"></i> 重复提交</div>
                                                    ) : item.status === 'missing' ? (
                                                        <div className="flex items-center gap-1.5 text-rose-500 bg-rose-50 px-3 py-1.5 rounded-full text-[10px] font-black border border-rose-100 w-fit"><i data-lucide="alert-octagon" className="w-3.5 h-3.5"></i> 缺发票</div>
                                                    ) : (
                                                        <div className="flex items-center gap-1.5 text-slate-300 bg-slate-50 px-3 py-1.5 rounded-full text-[10px] font-black border border-slate-100 w-fit"><i data-lucide="clock" className="w-3.5 h-3.5"></i> 待校</div>
                                                    )}
                                                </td>
                                                <td className="px-6 py-5">
                                                    <div className="text-[9px] font-bold text-indigo-400 mb-0.5 uppercase tracking-tighter opacity-70">{item.project}</div>
                                                    <div className="text-sm font-bold text-slate-700">{item.desc}</div>
                                                </td>
                                                <td className="px-6 py-5 text-right font-mono font-bold text-slate-800 text-sm">¥{item.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                                                <td className={`px-8 py-5 text-[10px] font-bold italic tracking-tight ${item.status.includes('error') ? 'text-rose-400' : 'text-slate-400'}`}>{item.note || '-'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            
                            <div className="px-8 py-6 bg-slate-900 text-white flex justify-between items-center">
                                <div className="text-[9px] font-black opacity-40 uppercase tracking-[0.2em]">Compliance Dual-Check Report</div>
                                <div className="flex gap-10 items-center">
                                    <div className="flex flex-col items-end">
                                        <span className="text-[9px] font-bold opacity-30 uppercase">Items</span>
                                        <span className="text-base font-black">{reimbursementData.length}</span>
                                    </div>
                                    <div className="flex flex-col items-end border-l border-slate-700 pl-10">
                                        <span className="text-[9px] font-bold opacity-30 uppercase">Grand Total</span>
                                        <span className="text-xl font-black font-mono text-indigo-400">¥{reimbursementData.reduce((a,b)=>a+b.amount,0).toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
        
        setInterval(() => window.lucide && lucide.createIcons(), 1000);
    </script>
</body>
</html>
