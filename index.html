<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财务差旅报销校对系统 - 聚细旅行专用版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS (XLSX) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .status-badge { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 智谱 AI 配置
        const ZHIPU_API_KEY = "8776cadbc359430cab2d635625ac65fe.3U3GnOC5VU2FfNKo";
        const ZHIPU_API_URL = "https://open.bigmodel.cn/api/paas/v4/chat/completions";

        const App = () => {
            const [headerInfo, setHeaderInfo] = useState({ person: '', date: '', company: '' });
            const [reimbursementData, setReimbursementData] = useState([]);
            const [invoiceFiles, setInvoiceFiles] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [results, setResults] = useState([]);
            const [logs, setLogs] = useState([]);
            const [activeTab, setActiveTab] = useState('all');

            const addLog = (msg) => {
                setLogs(prev => [`[${new Date().toLocaleTimeString()}] ${msg}`, ...prev]);
            };

            // 针对用户上传的模板优化的 Excel 解析逻辑
            const handleExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    const data = evt.target.result;
                    const workbook = XLSX.read(data, { type: 'binary' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    
                    // 将表格转为二维数组处理，因为模板上方有 metadata
                    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                    
                    // 1. 提取抬头信息 (报销人、日期等)
                    let person = "", date = "", company = "";
                    rows.forEach(row => {
                        const rowStr = row.join(',');
                        if (rowStr.includes('报销人：')) person = row[row.indexOf('报销人：') + 2] || '';
                        if (rowStr.includes('报销日期：')) date = row[row.indexOf('报销日期：') + 1] || '';
                        if (rowStr.includes('付款公司：')) company = row[row.indexOf('付款公司：') + 1] || '';
                    });
                    setHeaderInfo({ person, date, company });

                    // 2. 定位数据行 (寻找包含“序号”或“报销项目”的行)
                    let headerRowIndex = -1;
                    for(let i=0; i<rows.length; i++) {
                        if(rows[i].includes('序号') && rows[i].includes('报销金额')) {
                            headerRowIndex = i;
                            break;
                        }
                    }

                    if (headerRowIndex === -1) {
                        alert("未识别到标准报销单格式，请检查 Excel 模板是否正确。");
                        return;
                    }

                    const headers = rows[headerRowIndex];
                    const colMap = {
                        index: headers.indexOf('序号'),
                        category: headers.indexOf('报销项目'),
                        summary: headers.indexOf('摘要'),
                        type: headers.indexOf('发票类型（专/普）'),
                        amount: headers.indexOf('报销金额'),
                        hasInvoice: headers.indexOf('是否有发票')
                    };

                    // 3. 提取并清洗数据
                    const dataRows = rows.slice(headerRowIndex + 1);
                    const formatted = [];
                    let lastCategory = "";

                    for (let row of dataRows) {
                        const amount = parseFloat(row[colMap.amount]);
                        const summary = row[colMap.summary];
                        
                        // 遇到“合计”行则停止
                        if (row.join('').includes('合    计') || row.join('').includes('合计')) break;
                        
                        // 如果金额无效或是空行则跳过
                        if (isNaN(amount) || !summary) continue;

                        // 处理合并单元格逻辑：如果项目为空，沿用上一行的项目
                        const currentCategory = row[colMap.category] || lastCategory;
                        lastCategory = currentCategory;

                        formatted.push({
                            id: `row-${formatted.length}`,
                            category: currentCategory,
                            summary: summary,
                            type: row[colMap.type] || '无',
                            amount: amount,
                            hasInvoice: row[colMap.hasInvoice] || '否',
                            status: 'pending'
                        });
                    }
                    
                    setReimbursementData(formatted);
                    addLog(`Excel 导入成功: 已识别 ${formatted.length} 条有效报销项。报销人: ${person}`);
                };
                reader.readAsBinaryString(file);
            };

            const handleImageUpload = (e) => {
                const files = Array.from(e.target.files);
                const newInvoices = files.map(file => ({
                    id: Math.random().toString(36).substr(2, 9),
                    file,
                    preview: URL.createObjectURL(file),
                    status: 'waiting',
                    aiResult: null
                }));
                setInvoiceFiles(prev => [...prev, ...newInvoices]);
                addLog(`图片添加: 成功载入 ${files.length} 张发票图片。`);
            };

            const recognizeInvoice = async (invoice) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const base64Image = reader.result.split(',')[1];
                        try {
                            const response = await fetch(ZHIPU_API_URL, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${ZHIPU_API_KEY}`
                                },
                                body: JSON.stringify({
                                    model: "glm-4v",
                                    messages: [
                                        {
                                            role: "user",
                                            content: [
                                                { type: "text", text: "识别这张发票。输出 JSON 格式（只输出 JSON），包含字段：amount(数字), date(YYYY-MM-DD), type(类型)。" },
                                                { type: "image_url", image_url: { url: base64Image } }
                                            ]
                                        }
                                    ]
                                })
                            });
                            const res = await response.json();
                            const content = res.choices[0].message.content;
                            const jsonMatch = content.match(/\{.*\}/s);
                            const data = jsonMatch ? JSON.parse(jsonMatch[0]) : null;
                            resolve(data);
                        } catch (err) {
                            resolve(null);
                        }
                    };
                    reader.readAsDataURL(invoice.file);
                });
            };

            const startAudit = async () => {
                if (!reimbursementData.length || !invoiceFiles.length) {
                    alert("请先上传 Excel 报销单和发票照片");
                    return;
                }

                setIsProcessing(true);
                addLog("启动 AI 校对流程...");

                const processedInvoices = [];
                const tempInvoices = [...invoiceFiles];

                for (let i = 0; i < tempInvoices.length; i++) {
                    tempInvoices[i].status = 'processing';
                    setInvoiceFiles([...tempInvoices]);
                    addLog(`AI 正在解析第 ${i+1}/${tempInvoices.length} 张图片...`);
                    
                    const aiData = await recognizeInvoice(tempInvoices[i]);
                    tempInvoices[i].aiResult = aiData;
                    tempInvoices[i].status = 'done';
                    processedInvoices.push(aiData);
                    setInvoiceFiles([...tempInvoices]);
                }

                addLog("正在比对报销单与发票金额...");
                const auditResults = reimbursementData.map(item => {
                    // 核心匹配逻辑：金额允许 0.1 元以内的误差
                    const matchedInvoice = processedInvoices.find(inv => inv && Math.abs(inv.amount - item.amount) < 0.1);
                    return {
                        ...item,
                        status: matchedInvoice ? 'ok' : 'missing'
                    };
                });

                setResults(auditResults);
                setIsProcessing(false);
                addLog("校对任务全部完成！");
            };

            const filteredResults = results.length > 0 
                ? (activeTab === 'all' ? results : results.filter(r => r.status === activeTab))
                : reimbursementData;

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                            <div className="flex items-center gap-4">
                                <div className="p-4 bg-indigo-600 rounded-2xl text-white shadow-indigo-200 shadow-xl">
                                    <i data-lucide="file-check-2" className="w-8 h-8"></i>
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold text-slate-800 tracking-tight">聚细旅行财务校对系统</h1>
                                    <div className="flex gap-4 mt-1 text-xs text-slate-500 font-medium">
                                        <span className="flex items-center gap-1"><i data-lucide="user" className="w-3 h-3"></i> 报销人: {headerInfo.person || '-'}</span>
                                        <span className="flex items-center gap-1"><i data-lucide="calendar" className="w-3 h-3"></i> 日期: {headerInfo.date || '-'}</span>
                                        <span className="flex items-center gap-1"><i data-lucide="building" className="w-3 h-3"></i> 付款方: {headerInfo.company || '-'}</span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex gap-3">
                                <button 
                                    onClick={() => {setReimbursementData([]); setInvoiceFiles([]); setResults([]); setLogs([]);}}
                                    className="px-5 py-2.5 rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-50 font-medium transition-all"
                                >
                                    重置
                                </button>
                                <button 
                                    onClick={startAudit}
                                    disabled={isProcessing}
                                    className={`px-8 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-lg active:scale-95 ${
                                        isProcessing ? 'bg-slate-300 text-slate-500 cursor-not-allowed shadow-none' : 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-indigo-100'
                                    }`}
                                >
                                    {isProcessing ? <><i data-lucide="loader-2" className="animate-spin w-4 h-4"></i> 系统校对中...</> : <><i data-lucide="sparkles" className="w-4 h-4"></i> 开始 AI 审计</>}
                                </button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            {/* 文件上传侧边栏 */}
                            <div className="lg:col-span-4 space-y-6">
                                <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm relative overflow-hidden group">
                                    <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:opacity-10 transition-opacity">
                                        <i data-lucide="file-spreadsheet" className="w-16 h-16"></i>
                                    </div>
                                    <h3 className="font-bold flex items-center gap-2 mb-4 text-slate-700">
                                        <span className="w-6 h-6 rounded-full bg-green-100 text-green-600 flex items-center justify-center text-xs">1</span>
                                        上传报销单 Excel
                                    </h3>
                                    <div className="relative border-2 border-dashed border-slate-200 rounded-2xl p-6 text-center hover:border-indigo-400 hover:bg-indigo-50/30 transition-all cursor-pointer">
                                        <input type="file" accept=".xlsx,.xls" onChange={handleExcelUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
                                        <i data-lucide="upload-cloud" className="mx-auto text-slate-400 mb-2"></i>
                                        <p className="text-xs text-slate-500">点击上传聚细专用报销模板</p>
                                        {reimbursementData.length > 0 && <p className="mt-3 text-green-600 font-bold text-sm">已加载 {reimbursementData.length} 项</p>}
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm relative overflow-hidden group">
                                    <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:opacity-10 transition-opacity">
                                        <i data-lucide="images" className="w-16 h-16"></i>
                                    </div>
                                    <h3 className="font-bold flex items-center gap-2 mb-4 text-slate-700">
                                        <span className="w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-xs">2</span>
                                        批量上传发票
                                    </h3>
                                    <div className="relative border-2 border-dashed border-slate-200 rounded-2xl p-6 text-center hover:border-indigo-400 hover:bg-indigo-50/30 transition-all cursor-pointer mb-4">
                                        <input type="file" multiple accept="image/*" onChange={handleImageUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
                                        <i data-lucide="plus-circle" className="mx-auto text-slate-400 mb-2"></i>
                                        <p className="text-xs text-slate-500">支持拖入多张发票照片</p>
                                    </div>
                                    
                                    <div className="grid grid-cols-4 gap-3 max-h-48 overflow-y-auto pr-1 custom-scrollbar">
                                        {invoiceFiles.map(inv => (
                                            <div key={inv.id} className="relative aspect-square rounded-xl overflow-hidden border border-slate-100 group shadow-sm">
                                                <img src={inv.preview} className="w-full h-full object-cover" />
                                                {inv.status === 'processing' && (
                                                    <div className="absolute inset-0 bg-white/70 backdrop-blur-sm flex items-center justify-center">
                                                        <i data-lucide="refresh-cw" className="animate-spin text-indigo-600 w-5 h-5"></i>
                                                    </div>
                                                )}
                                                {inv.status === 'done' && (
                                                    <div className="absolute top-1 right-1 bg-green-500 text-white rounded-full p-0.5 shadow-md">
                                                        <i data-lucide="check" className="w-3 h-3"></i>
                                                    </div>
                                                )}
                                                <button 
                                                    onClick={() => setInvoiceFiles(f => f.filter(x => x.id !== inv.id))}
                                                    className="absolute inset-0 bg-red-500/90 text-white opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity"
                                                >
                                                    <i data-lucide="trash-2" className="w-5 h-5"></i>
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-slate-900 text-slate-400 p-5 rounded-3xl text-[11px] font-mono h-52 overflow-y-auto custom-scrollbar shadow-xl border border-slate-800">
                                    <div className="flex items-center justify-between mb-3 border-b border-slate-800 pb-2">
                                        <span className="text-indigo-400 font-bold uppercase tracking-widest flex items-center gap-2">
                                            <span className="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></span>
                                            Audit Console
                                        </span>
                                        <span className="text-slate-600">v1.2.0</span>
                                    </div>
                                    {logs.map((l, i) => <div key={i} className="mb-2 leading-relaxed opacity-90"><span className="text-slate-600">>></span> {l}</div>)}
                                    {logs.length === 0 && <div className="text-slate-700 italic flex items-center justify-center h-24">等待用户操作...</div>}
                                </div>
                            </div>

                            {/* 对账主视图 */}
                            <div className="lg:col-span-8">
                                <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden flex flex-col h-[760px]">
                                    <div className="p-6 border-b border-slate-50 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white sticky top-0 z-10 gap-4">
                                        <div>
                                            <h3 className="font-extrabold text-xl text-slate-800">报销项目审计清单</h3>
                                            <p className="text-xs text-slate-400 mt-1 uppercase tracking-widest font-bold">Audit Detail List</p>
                                        </div>
                                        <div className="flex bg-slate-50 p-1.5 rounded-2xl border border-slate-100">
                                            {[
                                                {id:'all', label: '全部'},
                                                {id:'ok', label: '已匹配'},
                                                {id:'missing', label: '发票缺失'}
                                            ].map(tab => (
                                                <button 
                                                    key={tab.id}
                                                    onClick={() => setActiveTab(tab.id)}
                                                    className={`px-6 py-2 rounded-xl text-xs font-bold transition-all ${
                                                        activeTab === tab.id ? 'bg-white text-indigo-600 shadow-md scale-[1.02]' : 'text-slate-400 hover:text-slate-600'
                                                    }`}
                                                >
                                                    {tab.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="flex-1 overflow-y-auto custom-scrollbar">
                                        <table className="w-full text-left border-separate border-spacing-0">
                                            <thead className="bg-slate-50/50 text-slate-400 text-[10px] uppercase font-bold tracking-widest sticky top-0 z-20 backdrop-blur-md">
                                                <tr>
                                                    <th className="px-8 py-5 border-b border-slate-100">审计状态</th>
                                                    <th className="px-6 py-5 border-b border-slate-100">类别 / 摘要</th>
                                                    <th className="px-6 py-5 border-b border-slate-100 text-right">报销金额</th>
                                                    <th className="px-6 py-5 border-b border-slate-100">发票类型</th>
                                                    <th className="px-8 py-5 border-b border-slate-100">系统建议</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {filteredResults.map((item, idx) => (
                                                    <tr key={idx} className="group hover:bg-slate-50/80 transition-all">
                                                        <td className="px-8 py-6">
                                                            {item.status === 'ok' ? (
                                                                <div className="flex items-center gap-2 text-emerald-600 font-bold text-xs bg-emerald-50 w-fit px-3 py-1.5 rounded-full border border-emerald-100">
                                                                    <i data-lucide="check-circle" className="w-4 h-4"></i> OK
                                                                </div>
                                                            ) : item.status === 'missing' ? (
                                                                <div className="flex items-center gap-2 text-rose-500 font-bold text-xs bg-rose-50 w-fit px-3 py-1.5 rounded-full border border-rose-100 animate-pulse">
                                                                    <i data-lucide="alert-octagon" className="w-4 h-4"></i> 缺失
                                                                </div>
                                                            ) : (
                                                                <div className="flex items-center gap-2 text-slate-400 font-bold text-xs bg-slate-50 w-fit px-3 py-1.5 rounded-full border border-slate-100">
                                                                    <i data-lucide="circle-dashed" className="w-4 h-4"></i> 待校
                                                                </div>
                                                            )}
                                                        </td>
                                                        <td className="px-6 py-6">
                                                            <div className="text-[10px] text-indigo-500 font-bold uppercase mb-1">{item.category}</div>
                                                            <div className="text-sm font-semibold text-slate-700">{item.summary}</div>
                                                        </td>
                                                        <td className="px-6 py-6 text-right">
                                                            <div className="text-base font-mono font-bold text-slate-800">
                                                                ¥{item.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}
                                                            </div>
                                                        </td>
                                                        <td className="px-6 py-6">
                                                            <span className={`text-[10px] px-2 py-0.5 rounded border font-bold ${
                                                                item.type === '普票' ? 'border-blue-100 text-blue-500 bg-blue-50' : 
                                                                item.type === '专票' ? 'border-orange-100 text-orange-500 bg-orange-50' : 
                                                                'border-slate-100 text-slate-400 bg-slate-50'
                                                            }`}>
                                                                {item.type}
                                                            </span>
                                                        </td>
                                                        <td className="px-8 py-6">
                                                            {item.status === 'ok' ? (
                                                                <div className="text-xs text-slate-500 flex items-center gap-1">
                                                                    <i data-lucide="info" className="w-3 h-3"></i> 已发现匹配发票
                                                                </div>
                                                            ) : item.status === 'missing' ? (
                                                                <div className="text-xs text-rose-400 font-medium flex items-center gap-1">
                                                                    <i data-lucide="x-circle" className="w-3 h-3"></i> 请要求员工补齐票据
                                                                </div>
                                                            ) : (
                                                                <div className="text-xs text-slate-300 italic">准备好后点击上方开始审计</div>
                                                            )}
                                                        </td>
                                                    </tr>
                                                ))}
                                                {reimbursementData.length === 0 && (
                                                    <tr>
                                                        <td colSpan="5" className="py-48 text-center">
                                                            <div className="inline-block p-10 rounded-full bg-slate-50 mb-4">
                                                                <i data-lucide="inbox" className="w-16 h-16 text-slate-200"></i>
                                                            </div>
                                                            <p className="text-slate-400 font-bold tracking-widest uppercase text-sm">Waiting for Data Import</p>
                                                            <p className="text-slate-300 text-xs mt-2">请先从左侧面板上传 Excel 文件</p>
                                                        </td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="p-6 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                                        <div className="text-xs text-slate-400 font-medium">
                                            共计 {reimbursementData.length} 项费用项
                                        </div>
                                        <div className="text-sm font-bold text-slate-800">
                                            总金额: ¥{reimbursementData.reduce((acc, curr) => acc + curr.amount, 0).toLocaleString(undefined, {minimumFractionDigits: 2})}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Initialize App
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
        
        // Refresh icons periodically
        setInterval(() => {
            if (window.lucide) window.lucide.createIcons();
        }, 800);

    </script>
</body>
</html>
</body>
</html>
